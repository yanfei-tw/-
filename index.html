<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>かけいぼ</title>
<style>
:root {
  --bg:#f0f2f5; --card:#fff; --text:#1a1a2e; --sub:#888; --border:#f0f0f0;
  --green:#27ae60; --green-lt:#f0fff4; --red:#e74c3c; --red-lt:#fff5f5;
  --orange:#e67e22; --orange-lt:#fff8f0; --blue:#2980b9; --dark:#1a1a2e;
  --radius:16px; --shadow:0 2px 10px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);padding-bottom:100px;font-size:16px}

/* ─── ヘッダー ─── */
header{background:var(--dark);color:#fff;padding:16px 18px 12px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:20px;font-weight:700}
.month-nav{display:flex;align-items:center;gap:4px}
.month-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:rgba(255,255,255,.3)}
#month-label{font-size:15px;min-width:90px;text-align:center}

/* ─── セットアップバナー ─── */
#setup-banner{margin:14px 14px 0;border-radius:var(--radius);padding:16px 18px;background:linear-gradient(135deg,#1a1a2e,#2c3e6e);color:#fff;display:none}
.banner-title{font-size:16px;font-weight:700;margin-bottom:6px}
.banner-steps{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.banner-step{background:rgba(255,255,255,.15);border-radius:20px;padding:6px 14px;font-size:13px;display:flex;align-items:center;gap:6px}
.banner-step.done{background:var(--green);opacity:.9}
.banner-step.active{background:rgba(255,255,255,.3);outline:2px solid rgba(255,255,255,.6)}

/* ─── 1日あたりカード（ヒーロー） ─── */
#daily-card{margin:14px 14px 0;border-radius:var(--radius);padding:22px 20px 18px;color:#fff;transition:background .4s}
#daily-card.good{background:linear-gradient(135deg,#27ae60,#2ecc71)}
#daily-card.warn{background:linear-gradient(135deg,#e67e22,#f39c12)}
#daily-card.bad {background:linear-gradient(135deg,#c0392b,#e74c3c)}
#daily-card.past{background:linear-gradient(135deg,#555,#777)}
.daily-top{font-size:13px;opacity:.9;margin-bottom:2px}
.daily-main{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px}
.daily-label{font-size:14px;opacity:.85;margin-bottom:6px}
.daily-amount{font-size:50px;font-weight:800;letter-spacing:-2px;line-height:1}
.daily-unit{font-size:18px;opacity:.85;margin-bottom:8px}
.daily-msg{font-size:13px;opacity:.85;margin-bottom:14px}
.progress-rows{display:flex;flex-direction:column;gap:6px}
.progress-row{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.9}
.progress-row span:first-child{min-width:32px}
.progress-bar{flex:1;height:6px;background:rgba(255,255,255,.3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:rgba(255,255,255,.9);border-radius:3px;transition:width .5s ease}
.progress-row span:last-child{min-width:32px;text-align:right}

/* ─── サマリー ─── */
#summary{margin:10px 14px 0;background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.summary-row:last-child{border-bottom:none}
.summary-row.total{padding-top:10px;margin-top:2px}
.sr-label{font-size:14px;color:var(--sub)}
.sr-val{font-size:16px;font-weight:700}
.sr-badge{font-size:12px;padding:2px 8px;border-radius:10px;font-weight:600}
.sr-badge.better{background:#e8f8ee;color:var(--green)}
.sr-badge.worse {background:#fdecea;color:var(--red)}
.sr-badge.same  {background:#f0f0f0;color:var(--sub)}

/* ─── セクション ─── */
.sec-label{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.8px;margin:18px 14px 6px;display:flex;justify-content:space-between;align-items:center}
.sec-total{font-size:13px;font-weight:600;color:var(--text)}
.card-list{margin:0 14px;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:12px}
.row:last-child{border-bottom:none}
.row.green-bg{background:var(--green-lt)}
.row.orange-bg{background:var(--orange-lt)}
.row-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.row-info{flex:1;min-width:0}
.row-name{font-size:16px;font-weight:500}
.row-sub{font-size:12px;color:var(--sub);margin-top:2px}
.row-amount{font-size:16px;font-weight:700;flex-shrink:0}
.row-amount.red   {color:var(--red)}
.row-amount.green {color:var(--green)}
.row-amount.zero  {color:#ccc}
.btn-sm{background:none;border:1.5px solid #e0e0e0;border-radius:8px;padding:5px 12px;font-size:13px;color:var(--sub);cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-sm:active{background:#f5f5f5}
.btn-sm.highlight{border-color:var(--green);color:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.row.total-row{background:#f8f9fa}
.row.total-row .row-name{font-weight:700;color:var(--text)}
.row.available-row{background:linear-gradient(135deg,#eafaf1,#d5f5e3)}

/* ─── カテゴリグリッド ─── */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 14px}
.cat-btn{background:var(--card);border:none;border-radius:var(--radius);padding:16px 8px 14px;text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:transform .1s;position:relative;overflow:hidden}
.cat-btn:active{transform:scale(.95)}
.cat-btn.has-data::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);border-radius:var(--radius) var(--radius) 0 0}
.cat-btn.bonus-btn.has-data::before{background:var(--orange)}
.cat-icon{font-size:28px;margin-bottom:6px}
.cat-name{font-size:12px;color:var(--sub);margin-bottom:4px;line-height:1.3}
.cat-total{font-size:13px;font-weight:700;color:#ccc}
.cat-total.active{color:var(--red)}
.cat-total.bonus-active{color:var(--orange)}

/* ─── 履歴 ─── */
.history-empty{padding:24px;text-align:center;color:#ccc;font-size:14px}
.history-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);gap:12px}
.history-row:last-child{border-bottom:none}
.h-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.h-info{flex:1;min-width:0}
.h-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-date{font-size:12px;color:var(--sub);margin-top:2px}
.h-amount{font-size:16px;font-weight:700;color:var(--red);flex-shrink:0}
.h-amount.bonus{color:var(--orange)}
.h-del{background:none;border:none;color:#ddd;font-size:24px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}

/* ─── 比較バッジ ─── */
.compare-row{padding:8px 16px;background:#f8f9fa;border-top:1px solid var(--border);font-size:13px;color:var(--sub);text-align:center}

/* ─── リセット ─── */
#reset-btn{display:block;margin:18px 14px 0;width:calc(100% - 28px);padding:15px;background:#f5f5f5;color:#bbb;border:none;border-radius:var(--radius);font-size:15px;cursor:pointer}

/* ─── モーダル ─── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:10px 20px 52px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes flashGreen{0%{background:#d4edda}50%{background:#a8d5b5}100%{background:inherit}}
.cat-btn.flashed{animation:flashGreen .6s ease}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:14px auto 20px}
.modal-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--sub);text-align:center;margin-bottom:20px}
.modal-amount-wrap{display:flex;align-items:center;background:#f5f7fa;border-radius:14px;padding:14px 18px;margin-bottom:14px;cursor:text}
.modal-amount-input{flex:1;font-size:38px;font-weight:800;border:none;background:transparent;text-align:right;outline:none;color:var(--text);min-width:0;font-family:inherit}
.modal-unit{font-size:20px;color:var(--sub);margin-left:8px;flex-shrink:0}
.modal-memo{width:100%;border:1.5px solid #eee;border-radius:12px;padding:13px 16px;font-size:16px;margin-bottom:16px;outline:none;font-family:inherit;transition:border-color .2s}
.modal-memo:focus{border-color:var(--dark)}
.modal-preview{font-size:13px;text-align:center;margin:-6px 0 14px;color:var(--sub);min-height:18px;transition:color .2s}
.modal-preview.has-val{color:var(--green);font-weight:600}
.modal-btns{display:flex;gap:10px}
.btn-cancel{flex:1;padding:16px;background:#f0f0f0;border:none;border-radius:14px;font-size:16px;color:var(--sub);cursor:pointer;font-weight:600}
.btn-ok{flex:2;padding:16px;background:var(--dark);border:none;border-radius:14px;font-size:16px;color:#fff;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-ok:active{opacity:.85}
.btn-ok.green-ok {background:var(--green)}
.btn-ok.orange-ok{background:var(--orange)}
</style>
</head>
<body>

<header>
  <h1>📒 かけいぼ <span style="font-size:11px;opacity:.5;font-weight:400">v2.2</span></h1>
  <div class="month-nav">
    <button id="prev-month">‹</button>
    <span id="month-label"></span>
    <button id="next-month">›</button>
  </div>
</header>

<!-- セットアップガイド -->
<div id="setup-banner">
  <div class="banner-title">👋 はじめに金額を設定しましょう</div>
  <div style="font-size:13px;opacity:.85">下の「変更」ボタンをタップして入力してください</div>
  <div class="banner-steps" id="banner-steps"></div>
</div>

<!-- 1日あたりカード -->
<div id="daily-card" class="good">
  <div class="daily-top" id="daily-top">今日から月末まであと <strong id="remaining-days">-</strong>日</div>
  <div class="daily-main">
    <div>
      <div class="daily-label">1日あたり</div>
      <div style="display:flex;align-items:flex-end;gap:6px">
        <div class="daily-amount" id="daily-amount">¥0</div>
        <div class="daily-unit">使えます</div>
      </div>
    </div>
  </div>
  <div class="daily-msg" id="daily-msg"></div>
  <div class="progress-rows" id="progress-rows">
    <div class="progress-row">
      <span>日数</span>
      <div class="progress-bar"><div class="progress-fill" id="day-bar" style="width:0%"></div></div>
      <span id="day-pct">0%</span>
    </div>
    <div class="progress-row">
      <span>支出</span>
      <div class="progress-bar"><div class="progress-fill" id="spend-bar" style="width:0%"></div></div>
      <span id="spend-pct">0%</span>
    </div>
  </div>
</div>

<!-- サマリー -->
<div id="summary">
  <div class="summary-row">
    <span class="sr-label">💰 収入合計</span>
    <span class="sr-val" style="color:var(--green)" id="s-income">¥0</span>
  </div>
  <div class="summary-row">
    <span class="sr-label">📤 固定支出</span>
    <span class="sr-val" style="color:var(--red)" id="s-fixed">¥0</span>
  </div>
  <div class="summary-row">
    <span class="sr-label">🛒 生活費</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="sr-badge same" id="compare-badge"></span>
      <span class="sr-val" style="color:var(--red)" id="s-var">¥0</span>
    </div>
  </div>
  <div class="summary-row">
    <span class="sr-label">🐷 積み立て</span>
    <span class="sr-val" style="color:var(--green)" id="s-savings">¥0</span>
  </div>
  <div class="summary-row total">
    <span class="sr-label" style="font-weight:700;color:var(--text)">今月の残り</span>
    <span class="sr-val" style="font-size:20px" id="s-remaining">¥0</span>
  </div>
</div>

<!-- 収入・固定費 -->
<div class="sec-label">収入・固定費・貯金</div>
<div class="card-list" id="fixed-list"></div>

<!-- カテゴリ -->
<div class="sec-label">
  生活費を記録する
  <span class="sec-total" id="var-total-label"></span>
</div>
<div class="cat-grid" id="cat-grid"></div>

<!-- 履歴 -->
<div class="sec-label">今月の記録</div>
<div class="card-list" id="history-list"></div>

<button id="reset-btn">今月の生活費をリセット</button>

<!-- 支出入力モーダル -->
<div class="modal-overlay" id="exp-modal" onclick="if(event.target===this)closeExp()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="exp-title"></div>
    <div class="modal-sub" id="exp-sub"></div>
    <div class="modal-amount-wrap" onclick="document.getElementById('exp-input').focus()">
      <input class="modal-amount-input" type="tel" id="exp-input" placeholder="0" inputmode="numeric" oninput="updateExpPreview()">
      <span class="modal-unit">円</span>
    </div>
    <div class="modal-preview" id="exp-preview"></div>
    <input type="text" class="modal-memo" id="exp-memo" placeholder="メモ（任意）例：スーパー、コンビニ">
    <div class="modal-btns">
      <button class="btn-cancel" id="exp-cancel" onclick="closeExp()">キャンセル</button>
      <button class="btn-ok" id="exp-ok" onclick="submitExp()">追加する</button>
    </div>
  </div>
</div>

<!-- 固定費設定モーダル -->
<div class="modal-overlay" id="fixed-modal" onclick="if(event.target===this)closeFixed()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="fixed-title"></div>
    <div class="modal-sub" id="fixed-sub"></div>
    <div class="modal-amount-wrap" onclick="document.getElementById('fixed-input').focus()">
      <input class="modal-amount-input" type="tel" id="fixed-input" placeholder="0" inputmode="numeric">
      <span class="modal-unit">円</span>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="fixed-cancel" onclick="closeFixed()">キャンセル</button>
      <button class="btn-ok green-ok" id="fixed-ok" onclick="submitFixed()">保存する</button>
    </div>
  </div>
</div>

<!-- ボーナスモーダル -->
<div class="modal-overlay" id="bonus-modal" onclick="if(event.target===this)closeBonusModal()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">🎉 ボーナス収入</div>
    <div class="modal-sub" id="bonus-sub"></div>
    <div class="modal-amount-wrap" onclick="document.getElementById('bonus-input').focus()">
      <input class="modal-amount-input" type="tel" id="bonus-input" placeholder="0" inputmode="numeric">
      <span class="modal-unit">円</span>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="bonus-cancel" onclick="closeBonusModal()">キャンセル</button>
      <button class="btn-ok orange-ok" id="bonus-ok" onclick="submitBonus()">保存する</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// 定数
// ══════════════════════════════════════
const FIXED_ITEMS = [
  {id:'loan_house', name:'住宅ローン',        icon:'🏠', type:'expense'},
  {id:'loan_car',   name:'カーローン',        icon:'🚗', type:'expense'},
  {id:'loan_card',  name:'カードローン',      icon:'💳', type:'expense'},
  {id:'loan_bank',  name:'銀行ローン',        icon:'🏦', type:'expense'},
  {id:'insurance',  name:'保険',              icon:'🛡️', type:'expense'},
  {id:'subscr',     name:'サブスク・定額',    icon:'📺', type:'expense'},
  {id:'savings',    name:'積み立て貯金',      icon:'🐷', type:'savings'},
];

const CATEGORIES = [
  {id:'food',      name:'食費',         icon:'🛒', bonus:false},
  {id:'gas',       name:'ガソリン',     icon:'⛽', bonus:false},
  {id:'daily',     name:'日用品',       icon:'🧴', bonus:false},
  {id:'dining',    name:'外食・飲み',   icon:'🍜', bonus:false},
  {id:'electric',  name:'光熱費',       icon:'💡', bonus:false},
  {id:'phone',     name:'通信費',       icon:'📱', bonus:false},
  {id:'transport', name:'交通費',       icon:'🚃', bonus:false},
  {id:'medical',   name:'医療・薬',     icon:'🏥', bonus:false},
  {id:'clothing',  name:'衣服・美容',   icon:'👗', bonus:false},
  {id:'social',    name:'交際費・お祝い',icon:'🎁', bonus:false},
  {id:'bonus_pay', name:'ボーナス払い', icon:'💰', bonus:true },
  {id:'misc',      name:'その他',       icon:'📦', bonus:false},
];

// ══════════════════════════════════════
// データ
// ══════════════════════════════════════
const K_FIXED  = 'kb3_fixed';
const K_INCOME = 'kb3_income';
const mKey = m => `kb3_${m}`;

const loadFixed  = () => {const d=localStorage.getItem(K_FIXED); return d?JSON.parse(d):{}};
const saveFixed  = v => localStorage.setItem(K_FIXED,JSON.stringify(v));
const loadIncome = () => parseInt(localStorage.getItem(K_INCOME)||'0',10)||0;
const saveIncome = v => localStorage.setItem(K_INCOME,String(v));
const loadMonth  = m => {const d=localStorage.getItem(mKey(m)); return d?JSON.parse(d):{entries:[],bonus_income:0}};
const saveMonth  = (m,d) => localStorage.setItem(mKey(m),JSON.stringify(d));

// ══════════════════════════════════════
// 状態
// ══════════════════════════════════════
let curMonth, monthData, fixedData, income;
let activeExpCat=null, activeFixedId=null;

// ══════════════════════════════════════
// ユーティリティ
// ══════════════════════════════════════
const todayMonth = () => {const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};
const monthLabel = m => {const[y,mo]=m.split('-');return `${y}年${parseInt(mo)}月`};
const yen = n => (n<0?'-':'')+'¥'+Math.abs(n).toLocaleString();
const parseAmt = s => parseInt((s||'').replace(/[^0-9]/g,'')||'0',10)||0;
const clamp = (v,mn,mx) => Math.min(mx,Math.max(mn,v));
const isCurrent = () => curMonth===todayMonth();

// ══════════════════════════════════════
// 計算
// ══════════════════════════════════════
function calcSummary(){
  const fixedExp  = FIXED_ITEMS.filter(f=>f.type==='expense').reduce((s,f)=>s+(fixedData[f.id]||0),0);
  const savings   = FIXED_ITEMS.filter(f=>f.type==='savings').reduce((s,f)=>s+(fixedData[f.id]||0),0);
  const varTotal  = monthData.entries.reduce((s,e)=>s+e.amount,0);
  const totalInc  = income+(monthData.bonus_income||0);
  const remaining = totalInc-fixedExp-savings-varTotal;
  return {fixedExp,savings,varTotal,totalInc,remaining};
}

function calcDaily(){
  if(!isCurrent()) return null;
  const today    = new Date();
  const [y,mo]   = curMonth.split('-').map(Number);
  const lastDay  = new Date(y,mo,0).getDate();
  const todayD   = today.getDate();
  const remDays  = lastDay-todayD+1;
  const {fixedExp,savings,varTotal,totalInc} = calcSummary();
  const varBudget  = totalInc-fixedExp-savings;
  const varRemain  = varBudget-varTotal;
  const daily      = remDays>0 ? Math.floor(varRemain/remDays) : 0;
  const dayPct     = Math.round((todayD-1)/lastDay*100);
  const spendPct   = varBudget>0 ? Math.round(varTotal/varBudget*100) : 0;
  return {daily,remDays,lastDay,dayPct,spendPct,varBudget,varRemain};
}

function calcPrevMonth(){
  const [y,mo] = curMonth.split('-').map(Number);
  const prev   = mo===1 ? `${y-1}-12` : `${y}-${String(mo-1).padStart(2,'0')}`;
  const pd     = loadMonth(prev);
  return pd.entries.reduce((s,e)=>s+e.amount,0);
}

// ══════════════════════════════════════
// レンダリング
// ══════════════════════════════════════
function renderAll(){
  renderSetupBanner();
  renderDailyCard();
  renderSummary();
  renderFixed();
  renderCats();
  renderHistory();
}

function renderSetupBanner(){
  const el = document.getElementById('setup-banner');
  const steps = document.getElementById('banner-steps');
  const hasIncome = income>0;
  const hasLoan   = FIXED_ITEMS.filter(f=>f.type==='expense').some(f=>(fixedData[f.id]||0)>0);

  if(hasIncome && hasLoan){ el.style.display='none'; return; }
  el.style.display='block';

  steps.innerHTML = [
    {label:'給料を入力', done:hasIncome},
    {label:'ローンを入力', done:hasLoan},
  ].map((s,i)=>{
    const cls = s.done?'banner-step done':(!hasIncome&&i===0)||( hasIncome&&!hasLoan&&i===1)?'banner-step active':'banner-step';
    return `<div class="${cls}">${s.done?'✓ ':''} ${s.label}</div>`;
  }).join('');
}

function renderDailyCard(){
  const dc  = document.getElementById('daily-card');
  const info = calcDaily();

  if(!info){
    // 過去月
    dc.className='past';
    document.getElementById('daily-top').innerHTML='<strong>過去月の記録</strong>';
    document.getElementById('daily-amount').textContent = yen(calcSummary().varTotal);
    document.getElementById('daily-unit-wrap') && (document.getElementById('daily-unit-wrap').textContent='');
    document.querySelector('.daily-label').textContent='生活費合計';
    document.querySelector('.daily-unit').textContent='';
    document.getElementById('daily-msg').textContent='';
    document.getElementById('progress-rows').style.display='none';
    return;
  }

  document.querySelector('.daily-label').textContent='1日あたり';
  document.querySelector('.daily-unit').textContent='使えます';
  document.getElementById('progress-rows').style.display='flex';
  document.getElementById('remaining-days').textContent=info.remDays;
  document.getElementById('daily-amount').textContent = info.daily>=0 ? yen(info.daily) : yen(info.daily);

  const msgs = [
    info.daily>=5000  ? '余裕あり👌 このペースで続けましょう' :
    info.daily>=2000  ? 'ちょうどいいペースです' :
    info.daily>=0     ? '少し節約を意識しましょう⚠️' :
                        '今月の予算オーバーです😰'
  ];
  document.getElementById('daily-msg').textContent = msgs[0];
  dc.className = info.daily>=2000?'good':info.daily>=0?'warn':'bad';

  const dayBar   = clamp(info.dayPct,0,100);
  const spendBar = clamp(info.spendPct,0,100);
  document.getElementById('day-bar').style.width   = dayBar+'%';
  document.getElementById('spend-bar').style.width = spendBar+'%';
  document.getElementById('day-pct').textContent   = dayBar+'%';
  document.getElementById('spend-pct').textContent = spendBar+'%';
  document.getElementById('daily-top').innerHTML   = `今日から月末まであと <strong>${info.remDays}</strong>日`;
}

function renderSummary(){
  const {fixedExp,savings,varTotal,totalInc,remaining} = calcSummary();
  document.getElementById('s-income').textContent  = yen(totalInc);
  document.getElementById('s-fixed').textContent   = yen(fixedExp);
  document.getElementById('s-var').textContent     = yen(varTotal);
  document.getElementById('s-savings').textContent = yen(savings);
  const remEl = document.getElementById('s-remaining');
  remEl.textContent  = yen(remaining);
  remEl.style.color  = remaining>=0?'var(--green)':'var(--red)';

  // 先月比
  const prevVar = calcPrevMonth();
  const badge   = document.getElementById('compare-badge');
  if(prevVar>0 && isCurrent()){
    const diff = varTotal-prevVar;
    badge.textContent = diff>0 ? `先月比 +${yen(diff)}` : diff<0 ? `先月比 ${yen(diff)}` : '先月と同じ';
    badge.className   = 'sr-badge '+(diff<0?'better':diff>0?'worse':'same');
  } else {
    badge.textContent='';
  }
}

function renderFixed(){
  const el = document.getElementById('fixed-list');
  const fixedExp = FIXED_ITEMS.filter(f=>f.type==='expense').reduce((s,f)=>s+(fixedData[f.id]||0),0);
  const savings  = FIXED_ITEMS.filter(f=>f.type==='savings').reduce((s,f)=>s+(fixedData[f.id]||0),0);
  const varBudget= income+(monthData.bonus_income||0)-fixedExp-savings;
  const incBtn   = income===0 ? 'btn-sm highlight' : 'btn-sm';

  let html = `
    <div class="row green-bg">
      <span class="row-icon">💰</span>
      <div class="row-info"><div class="row-name">毎月の給料（手取り）</div><div class="row-sub">基本収入</div></div>
      <span class="row-amount ${income>0?'green':'zero'}">${yen(income)}</span>
      <button class="${incBtn}" onclick="openFixed('__income__')">変更</button>
    </div>
    <div class="row orange-bg" onclick="openBonusModal()" style="cursor:pointer">
      <span class="row-icon">🎉</span>
      <div class="row-info"><div class="row-name">ボーナス収入</div><div class="row-sub">今月のみ・タップして入力</div></div>
      <span class="row-amount ${monthData.bonus_income>0?'green':'zero'}">${yen(monthData.bonus_income||0)}</span>
      <button class="btn-sm" onclick="event.stopPropagation();openBonusModal()">入力</button>
    </div>`;

  for(const item of FIXED_ITEMS){
    const val = fixedData[item.id]||0;
    const isSav = item.type==='savings';
    const cls   = isSav?'green':val>0?'red':'zero';
    const sub   = isSav?'資産として積み立て':'毎月固定で引かれる';
    const rowCls= isSav?'row green-bg':'row';
    html += `<div class="${rowCls}">
      <span class="row-icon">${item.icon}</span>
      <div class="row-info"><div class="row-name">${item.name}</div><div class="row-sub">${sub}</div></div>
      <span class="row-amount ${cls}">${yen(val)}</span>
      <button class="btn-sm" onclick="openFixed('${item.id}')">変更</button>
    </div>`;
  }

  // 合計行
  html += `
    <div class="row total-row">
      <span class="row-icon">📊</span>
      <div class="row-info"><div class="row-name">毎月の固定支出合計</div><div class="row-sub">ローン・保険・サブスクなど</div></div>
      <span class="row-amount red">${yen(fixedExp)}</span>
    </div>
    <div class="row available-row">
      <span class="row-icon">✅</span>
      <div class="row-info"><div class="row-name">今月の生活費として使えるお金</div><div class="row-sub">収入 - 固定支出 - 積み立て</div></div>
      <span class="row-amount green" style="font-size:18px">${yen(varBudget)}</span>
    </div>`;

  el.innerHTML = html;
}

function renderCats(){
  const el = document.getElementById('cat-grid');
  const varTotal = monthData.entries.reduce((s,e)=>s+e.amount,0);
  document.getElementById('var-total-label').textContent = varTotal>0 ? `合計 ${yen(varTotal)}` : '';

  el.innerHTML = CATEGORIES.map(cat=>{
    const total = monthData.entries.filter(e=>e.cat===cat.id).reduce((s,e)=>s+e.amount,0);
    const has   = total>0;
    const btnCls= `cat-btn${cat.bonus?' bonus-btn':''}${has?' has-data':''}`;
    const totCls= `cat-total${has?(cat.bonus?' bonus-active':' active'):''}`;
    return `<button class="${btnCls}" onclick="openExp('${cat.id}')">
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="${totCls}">${has?yen(total):'¥0'}</div>
    </button>`;
  }).join('');
}

function renderHistory(){
  const el      = document.getElementById('history-list');
  const entries = [...monthData.entries].reverse();
  if(!entries.length){ el.innerHTML='<div class="history-empty">まだ記録がありません<br><span style="font-size:12px">上のカテゴリをタップして入力してください</span></div>'; return; }

  el.innerHTML = entries.map((e,ri)=>{
    const i   = monthData.entries.length-1-ri;
    const cat = CATEGORIES.find(c=>c.id===e.cat)||{icon:'📦',name:e.cat,bonus:false};
    const d   = new Date(e.ts);
    const ds  = `${d.getMonth()+1}/${d.getDate()}（${['日','月','火','水','木','金','土'][d.getDay()]}） ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="history-row">
      <span class="h-icon">${cat.icon}</span>
      <div class="h-info">
        <div class="h-name">${cat.name}${e.memo?' · '+e.memo:''}</div>
        <div class="h-date">${ds}</div>
      </div>
      <span class="h-amount${cat.bonus?' bonus':''}">${yen(e.amount)}</span>
      <button class="h-del" onclick="confirmDelete(${i})">×</button>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════
// データ操作
// ══════════════════════════════════════
function confirmDelete(i){
  const e   = monthData.entries[i];
  const cat = CATEGORIES.find(c=>c.id===e.cat)||{name:e.cat};
  if(!confirm(`「${cat.name} ${yen(e.amount)}」を削除しますか？`)) return;
  monthData.entries.splice(i,1);
  saveMonth(curMonth,monthData);
  renderAll();
}

// ══════════════════════════════════════
// モーダル：支出
// ══════════════════════════════════════
function openExp(catId){
  activeExpCat=catId;
  const cat  = CATEGORIES.find(c=>c.id===catId);
  const total= monthData.entries.filter(e=>e.cat===catId).reduce((s,e)=>s+e.amount,0);
  document.getElementById('exp-title').textContent = `${cat.icon}  ${cat.name}`;
  document.getElementById('exp-sub').textContent   = `今月の合計: ${yen(total)}`;
  document.getElementById('exp-input').value = '';
  document.getElementById('exp-memo').value  = '';
  document.getElementById('exp-preview').textContent = '';
  document.getElementById('exp-preview').className = 'modal-preview';
  document.getElementById('exp-ok').className = cat.bonus?'btn-ok orange-ok':'btn-ok';
  document.getElementById('exp-modal').classList.add('open');
  setTimeout(()=>document.getElementById('exp-input').focus(),180);
}
function updateExpPreview(){
  const cat   = CATEGORIES.find(c=>c.id===activeExpCat);
  const now   = monthData.entries.filter(e=>e.cat===activeExpCat).reduce((s,e)=>s+e.amount,0);
  const add   = parseAmt(document.getElementById('exp-input').value);
  const prev  = document.getElementById('exp-preview');
  if(add>0){
    prev.textContent = `追加後の合計: ${yen(now+add)}`;
    prev.className   = 'modal-preview has-val';
  } else {
    prev.textContent = '';
    prev.className   = 'modal-preview';
  }
}
const closeExp = () => document.getElementById('exp-modal').classList.remove('open');
function submitExp(){
  const amount = parseAmt(document.getElementById('exp-input').value);
  if(!amount) return;
  const catId = activeExpCat;
  monthData.entries.push({cat:catId,amount,memo:document.getElementById('exp-memo').value.trim(),ts:Date.now()});
  saveMonth(curMonth,monthData);
  closeExp();
  setTimeout(()=>{
    renderAll();
    // renderAll後にボタンを探して光らせる（innerHTML再生成後）
    requestAnimationFrame(()=>{
      const btn = document.querySelector(`[onclick="openExp('${catId}')"]`);
      if(btn){
        btn.classList.add('flashed');
        btn.scrollIntoView({behavior:'smooth',block:'nearest'});
        setTimeout(()=>btn.classList.remove('flashed'), 700);
      }
    });
  }, 80);
}

// ══════════════════════════════════════
// モーダル：固定費・収入
// ══════════════════════════════════════
function openFixed(id){
  activeFixedId=id;
  if(id==='__income__'){
    document.getElementById('fixed-title').textContent='💰  毎月の給料（手取り）';
    document.getElementById('fixed-sub').textContent='振込後の実際の手取り額を入力してください';
    document.getElementById('fixed-input').value=income||'';
  } else {
    const item=FIXED_ITEMS.find(f=>f.id===id);
    document.getElementById('fixed-title').textContent=`${item.icon}  ${item.name}`;
    document.getElementById('fixed-sub').textContent=item.type==='savings'?'毎月積み立てる金額を入力してください（0でスキップ）':'毎月の返済額を入力してください（0でスキップ）';
    document.getElementById('fixed-input').value=fixedData[id]||'';
  }
  document.getElementById('fixed-modal').classList.add('open');
  setTimeout(()=>document.getElementById('fixed-input').focus(),180);
}
const closeFixed = () => document.getElementById('fixed-modal').classList.remove('open');
function submitFixed(){
  const val=parseAmt(document.getElementById('fixed-input').value);
  if(activeFixedId==='__income__'){income=val;saveIncome(val);}
  else{fixedData[activeFixedId]=val;saveFixed(fixedData);}
  closeFixed();
  renderAll();
}

// ══════════════════════════════════════
// モーダル：ボーナス
// ══════════════════════════════════════
function openBonusModal(){
  document.getElementById('bonus-sub').textContent=`${monthLabel(curMonth)}に受け取ったボーナスを入力してください`;
  document.getElementById('bonus-input').value=monthData.bonus_income||'';
  document.getElementById('bonus-modal').classList.add('open');
  setTimeout(()=>document.getElementById('bonus-input').focus(),180);
}
const closeBonusModal = () => document.getElementById('bonus-modal').classList.remove('open');
function submitBonus(){
  monthData.bonus_income=parseAmt(document.getElementById('bonus-input').value);
  saveMonth(curMonth,monthData);
  closeBonusModal();
  renderAll();
}

// ══════════════════════════════════════
// イベント
// ══════════════════════════════════════
function bindEvents(){
  // Enterキーでも確定できるようにする
  document.getElementById('exp-input').onkeydown=e=>{if(e.key==='Enter')submitExp()};
  document.getElementById('fixed-input').onkeydown=e=>{if(e.key==='Enter')submitFixed()};
  document.getElementById('bonus-input').onkeydown=e=>{if(e.key==='Enter')submitBonus()};

  document.getElementById('prev-month').onclick=()=>{
    const[y,m]=curMonth.split('-').map(Number);
    curMonth=m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;
    monthData=loadMonth(curMonth);
    document.getElementById('month-label').textContent=monthLabel(curMonth);
    renderAll();
  };
  document.getElementById('next-month').onclick=()=>{
    const[y,m]=curMonth.split('-').map(Number);
    curMonth=m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;
    monthData=loadMonth(curMonth);
    document.getElementById('month-label').textContent=monthLabel(curMonth);
    renderAll();
  };

  document.getElementById('reset-btn').onclick=()=>{
    if(!confirm('今月の生活費の記録をすべて削除します。\n（固定費・収入・ボーナスはそのまま残ります）'))return;
    monthData.entries=[];
    saveMonth(curMonth,monthData);
    renderAll();
  };
}

// ══════════════════════════════════════
// 初期化
// ══════════════════════════════════════
function checkStorage(){
  try{
    localStorage.setItem('_test','1');
    if(localStorage.getItem('_test')!=='1') throw new Error();
    localStorage.removeItem('_test');
    return true;
  }catch(e){ return false; }
}

function init(){
  if(!checkStorage()){
    document.body.innerHTML=`<div style="padding:40px 24px;text-align:center;font-family:sans-serif">
      <div style="font-size:48px;margin-bottom:16px">⚠️</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:12px">このブラウザでは保存できません</div>
      <div style="font-size:14px;color:#666;line-height:1.7;margin-bottom:24px">
        LINEやアプリ内ブラウザでは<br>データが保存されません。<br><br>
        <strong>SafariまたはChromeで開いてください</strong><br>
        （右上の「…」→「ブラウザで開く」）
      </div>
      <div style="font-size:13px;color:#999">URL: https://yanfei-tw.github.io/-/</div>
    </div>`;
    return;
  }
  curMonth  = todayMonth();
  monthData = loadMonth(curMonth);
  fixedData = loadFixed();
  income    = loadIncome();
  document.getElementById('month-label').textContent=monthLabel(curMonth);
  renderAll();
  bindEvents();
}

init();
</script>
